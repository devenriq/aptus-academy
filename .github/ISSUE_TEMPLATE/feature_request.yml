name: Feature Request
description: Propose a new feature or improvement
labels: ["enhancement", "status:needs-review"]
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues and this feature has not been proposed before
          required: true
        - label: I understand this issue needs status:approved before a PR can be opened
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem it solves
      description: What problem or need motivates this feature?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should it work from the user's perspective?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - apps/web
        - apps/mobile
        - apps/api
        - packages/shared
        - CI/Workflows
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
