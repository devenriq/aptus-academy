name: Bug Report
description: Reportar un comportamiento inesperado o error en la aplicación
labels: ["bug", "status:needs-review"]
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Verificaciones previas
      options:
        - label: Busqué issues existentes y este no es un duplicado
          required: true
        - label: Entiendo que el issue necesita status:approved antes de abrir un PR
          required: true

  - type: textarea
    id: description
    attributes:
      label: Descripción del bug
      description: Descripción clara y concisa del problema
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Pasos para reproducir
      placeholder: |
        1. Ir a '...'
        2. Hacer click en '...'
        3. Ver el error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportamiento esperado
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Comportamiento actual
    validations:
      required: true

  - type: dropdown
    id: app
    attributes:
      label: App afectada
      options:
        - apps/web
        - apps/mobile
        - apps/api
        - packages/shared
        - Otra
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs relevantes
      render: shell
