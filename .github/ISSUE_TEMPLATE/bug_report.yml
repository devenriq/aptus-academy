name: Bug Report
description: Report unexpected behavior or errors in the application
labels: ["bug", "status:needs-review"]
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: I understand this issue needs status:approved before a PR can be opened
          required: true

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: Clear and concise description of the problem
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: dropdown
    id: app
    attributes:
      label: Affected app
      options:
        - apps/web
        - apps/mobile
        - apps/api
        - packages/shared
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
